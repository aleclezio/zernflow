name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  checks:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - name: Guard — key columns only via lib/workspace-keys.ts
        run: bash scripts/check-key-access.sh

  integration:
    name: Integration tests (local Supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          # Pinned, not `latest`: the CLI version transitively pins the local
          # stack images `supabase start` pulls. v2.106.0 (2026-06-11) changed
          # the default JWT signing so freshly-minted user tokens fail PostgREST
          # validation and downgrade to `anon` -> "permission denied for table
          # workspace_members" in createTestUser. v2.105.0 is the last green
          # version. Upgrade deliberately (review CI), never implicitly via latest.
          # Follow-up: adopt v2.106.x's asymmetric JWT signing as reviewed work.
          version: 2.105.0
      - run: npm ci
      - run: supabase start
      - run: node scripts/dev-env.mjs
      - run: npm run test:integration
